<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Matter Device Manager</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link href="addin.css" rel="stylesheet">
</head>
<body>

<div id="digitalMatterDeviceManager">

    <!--
        NOTE: No header rendered here.
        When embedded in the Traxxis Suite, the suite's unified header is used.
        The suite dashboard injects the addin title, back button, and Refresh
        button into the header automatically.

        If you ever need to run this add-in fully standalone (outside the suite),
        uncomment the header block below:

    <div class="device-manager-header">
        <img src="https://cdn.baseline.is/static/content/logos/mDtvptChQ3XwBLuxuu5hip-lala.svg"
             alt="Traxxis GPS" class="company-logo">
        <div class="header-divider"></div>
        <h1 class="header-title">Digital Matter Device Manager</h1>
        <button class="btn-header-action ms-auto" onclick="refreshDevices()">
            <i class="fas fa-rotate-right"></i> Refresh
        </button>
    </div>
    -->

    <!-- Alert Container -->
    <div id="alertContainer"></div>

    <!-- Controls: Search + Count -->
    <div class="controls-section">
        <div class="row align-items-center g-3">
            <div class="col-md-7">
                <label for="deviceSearch" class="form-label">Search Devices</label>
                <div class="input-group">
                    <span class="input-group-text">
                        <i class="fas fa-search"></i>
                    </span>
                    <input type="text"
                           class="form-control search-input"
                           id="deviceSearch"
                           placeholder="Search by name, serial number, or Geotab serial…">
                </div>
            </div>
            <div class="col-md-5 text-md-end">
                <div class="device-count" id="deviceCount">Loading devices…</div>
            </div>
        </div>
    </div>

    <!-- Filters -->
    <div class="filters-section">
        <div class="row g-3 align-items-end">
            <div class="col-md-2 col-6">
                <label for="modeFilter" class="form-label">Mode</label>
                <select class="form-select" id="modeFilter">
                    <option value="all">All Modes</option>
                    <option value="normal">Normal</option>
                    <option value="recovery">Recovery</option>
                </select>
            </div>
            <div class="col-md-2 col-6">
                <label for="batteryFilter" class="form-label">Battery</label>
                <select class="form-select" id="batteryFilter">
                    <option value="all">All Levels</option>
                    <option value="good">Good (&gt;50%)</option>
                    <option value="low">Low (20–50%)</option>
                    <option value="critical">Critical (&lt;20%)</option>
                    <option value="unknown">Unknown</option>
                </select>
            </div>
            <div class="col-md-2 col-6">
                <label for="deviceTypeFilter" class="form-label">Type</label>
                <select class="form-select" id="deviceTypeFilter">
                    <option value="all">All Types</option>
                </select>
            </div>
            <div class="col-md-3 col-6">
                <label for="sortBy" class="form-label">Sort By</label>
                <select class="form-select" id="sortBy">
                    <option value="name-asc">Name (A–Z)</option>
                    <option value="name-desc">Name (Z–A)</option>
                    <option value="battery-high">Battery (High → Low)</option>
                    <option value="battery-low">Battery (Low → High)</option>
                </select>
            </div>
            <div class="col-md-3 text-md-end">
                <button class="btn btn-success" onclick="downloadCSV()">
                    <i class="fas fa-download me-2"></i>Download CSV
                </button>
            </div>
        </div>
    </div>

    <!-- Devices List -->
    <div id="devicesList">
        <div class="empty-state">
            <div class="spinner-border loading-spinner" role="status">
                <span class="visually-hidden">Loading…</span>
            </div>
            <p class="mt-3">Loading Digital Matter devices…</p>
        </div>
    </div>

</div>

<!-- Bootstrap JS -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

<script src="addin.js"></script>
</body>
</html>
